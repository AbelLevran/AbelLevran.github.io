<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Found | Abel Levran</title>
  <link rel="icon" type="image/png" href="/logo2.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap');

    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #0A0A0A;
      color: #FFFFFF;
      font-family: 'Outfit', sans-serif;
      background-image: radial-gradient(rgba(255, 255, 255, 0.03) 2px, transparent 2px);
      background-size: 30px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 6rem;
      font-weight: 800;
      margin: 0;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    p {
      color: #A0A0A0;
      font-size: 1.2rem;
      max-width: 500px;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .btn-primary {
      background-color: #FFD700;
      color: #000;
      padding: 14px 32px;
      border-radius: 30px;
      font-weight: 600;
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary:hover {
      background-color: #F5C518;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
      transform: translateY(-2px);
    }

    .glass-box {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 50px;
      border-radius: 20px;
      margin: 20px;
    }
  </style>
</head>

<body>
  <div class="glass-box">
    <h1>404</h1>
    <h2>Project Link Not Available</h2>
    <p>The repository or live demo link you're looking for hasn't been uploaded yet or is currently private. Please
      check back later!</p>
    <a href="/" class="btn-primary">
      ← Back to Portfolio
    </a>
  </div>
</body>

</html>
